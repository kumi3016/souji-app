<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掃除当番</title>
</head>

<body>

<h1>掃除当番</h1>

<button onclick="getTodayDuty()">今日の担当を決める</button>

<div id="result"></div>

<script>
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function getTodayDuty() {

  let members = [
    "赤松さん",
    "井関さん",
    "渚さん",
    "松川さん",
    "岡田さん",
    "森川さん",
    "中尾さん",
    "早藤さん",
    "中山さん",
    "山本龍弘さん",
    "奥さん",
    "三好さん",
    "尾鷲さん",
    "森田さん",
    "山下さん",
    "山本久美子"
  ];

  shuffle(members);

  let used = [];

  function pick() {
    let person = members.find(p => !used.includes(p));

    if (person) {
      used.push(person);
      return person;
    }

    return "担当不足";
  }

  let result = `
男子トイレ：${pick()}<br>
女子トイレ：${pick()}<br>
軽作業側掃除機：${pick()}<br>
PC側掃除機：${pick()}<br>
台所：${pick()}<br>
玄関：${pick()}<br>
ごみ捨て：${pick()}<br>
炊飯器の釜洗い：${pick()}
`;

  document.getElementById("result").innerHTML = result;
}
</script>

</body>
</html>
