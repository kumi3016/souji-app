<script>
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;

  
JavaScript
function shuffle(array) {
  let arr = [...array];

  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }

  return arr;
}

function getTodayDuty() {

  let duties = {
    "男子トイレ": ["赤松さん","井関さん","岡田さん"],
    "女子トイレ": ["渚さん","松川さん"],
    "軽作業側掃除機": ["赤松さん","井関さん","渚さん","山本久美子"],
    "PC側掃除機": ["中尾さん"],
    "台所": ["赤松さん","井関さん","渚さん","山下さん"],
    "玄関": ["赤松さん","井関さん","渚さん","森田さん"],
    "ごみ捨て": ["尾鷲さん"],
    "炊飯器の釜洗い": ["井関さん"]
  };

  let used = [];
  let result = "";

  for(let place in duties){

    let candidates = shuffle(
      duties[place].filter(name => !used.includes(name))
    );

    let person = candidates[0];

    if(!person){
      person = duties[place][0];
    }

    used.push(person);

    result += `<p>${place}: ${person}</p>`;
  }

  document.getElementById("result").innerHTML = result;
}
